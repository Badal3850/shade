name: release

on:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
      - run: flutter config --no-analytics
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
      - run: flutter config --no-analytics
      - run: flutter pub get

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_B64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/keystore.jks
          fi

      - name: Build release APKs
        run: flutter build apk --release --split-per-abi
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APKs
        working-directory: build/app/outputs/flutter-apk
        run: |
          for f in app-armeabi-v7a-release.apk app-arm64-v8a-release.apk app-x86_64-release.apk; do
            [ -f "$f" ] || continue
            abi=$(echo "$f" | sed 's/app-//; s/-release//')
            mv "$f" "shade-${abi}.apk"
          done

      - name: Extract version
        id: version
        run: echo "value=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: apks
          path: build/app/outputs/flutter-apk/shade-*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apks

      - name: Create release
        run: |
          TAG="v${{ needs.build.outputs.version }}"
          gh release create "$TAG" \
            --title "shade ${{ needs.build.outputs.version }}" \
            --notes "Automated release from commit ${{ github.sha }}" \
            shade-*.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
