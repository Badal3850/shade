name: release

on:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
      - run: flutter config --no-analytics
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build:
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
      - run: flutter config --no-analytics
      - run: flutter pub get

      - name: Generate release metadata
        id: release_meta
        run: |
          set -euo pipefail

          RAW_VERSION="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          VERSION_NAME="${RAW_VERSION%%+*}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          VERSION="${VERSION_NAME}+${BUILD_NUMBER}"
          TAG="v${VERSION}"

          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Decode keystore
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_B64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/keystore.jks
          fi

      - name: Build release APKs
        run: >
          flutter build apk --release --split-per-abi
          --build-name "${{ steps.release_meta.outputs.version_name }}"
          --build-number "${{ steps.release_meta.outputs.build_number }}"
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APKs
        working-directory: build/app/outputs/flutter-apk
        run: |
          for f in app-armeabi-v7a-release.apk app-arm64-v8a-release.apk app-x86_64-release.apk; do
            [ -f "$f" ] || continue
            abi=$(echo "$f" | sed 's/app-//; s/-release//')
            mv "$f" "shade-${abi}.apk"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: apks
          path: build/app/outputs/flutter-apk/shade-*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: apks

      - name: Create or update release
        run: |
          set -euo pipefail

          TAG="${{ needs.build.outputs.tag }}"
          VERSION="${{ needs.build.outputs.version }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" shade-*.apk --clobber
          else
            gh release create "$TAG" \
              --target "${{ github.sha }}" \
              --title "shade ${VERSION}" \
              --notes "Automated release from commit ${{ github.sha }}" \
              shade-*.apk
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
