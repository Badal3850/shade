stages:
  - test
  - build
  - release

variables:
  FLUTTER_VERSION: "3.41.9"

# ──────────────────────────────
# CI variables required for signing & release:
#   ANDROID_KEYSTORE_B64  — base64-encoded Android keystore (release signing)
#   KEYSTORE_PASSWORD     — keystore password
#   KEY_ALIAS             — signing key alias
#   KEY_PASSWORD          — signing key password
#   GITHUB_TOKEN          — GitHub personal access token (public_repo scope)
#   GITHUB_REPO           — GitHub repository (e.g. "bm3850/digital-pet")
# ──────────────────────────────

test:
  stage: test
  image: ghcr.io/cirruslabs/flutter:$FLUTTER_VERSION
  only:
    - main
  before_script:
    - flutter config --no-analytics
    - flutter pub get
  script:
    - flutter analyze
    - flutter test
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .dart_tool/
      - .pub-cache/

build-release-apk:
  stage: build
  image: ghcr.io/cirruslabs/flutter:$FLUTTER_VERSION
  only:
    - main
  needs:
    - test
  before_script:
    - flutter config --no-analytics
    - flutter pub get
    - |
      if [ -n "${ANDROID_KEYSTORE_B64}" ]; then
        echo "${ANDROID_KEYSTORE_B64}" | base64 -d > android/keystore.jks
        export KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD}"
        export KEY_ALIAS="${KEY_ALIAS}"
        export KEY_PASSWORD="${KEY_PASSWORD}"
        echo "Keystore decoded and configured for release signing."
      else
        echo "WARNING: No ANDROID_KEYSTORE_B64 found. APK will be signed with debug key."
      fi
  script:
    - flutter build apk --release --split-per-abi
  after_script:
    - mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk build/app/outputs/flutter-apk/digital-pet-arm32-v7a.apk 2>/dev/null || true
    - mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/digital-pet-arm64-v8a.apk 2>/dev/null || true
    - mv build/app/outputs/flutter-apk/app-x86_64-release.apk build/app/outputs/flutter-apk/digital-pet-x86_64.apk 2>/dev/null || true
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/digital-pet-*.apk
      - pubspec.yaml
    expire_in: 2 weeks

release-to-github:
  stage: release
  image: alpine:latest
  only:
    - main
  needs:
    - build-release-apk
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      VERSION=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | tr -d ' ')
      TAG="v${VERSION}"
      RELEASE_NAME="Digital Pet ${VERSION}"

      NOTES="Automated release from GitLab CI pipeline #${CI_PIPELINE_ID}

      Commit: ${CI_COMMIT_SHA}
      Branch: ${CI_COMMIT_BRANCH}
      Pipeline: ${CI_PIPELINE_URL}"

      echo "Creating GitHub release: $TAG"

      # Check if tag already exists
      EXISTING=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
        "https://api.github.com/repos/${GITHUB_REPO}/releases/tags/${TAG}" | jq -r '.id // empty')

      if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
        echo "Release tag ${TAG} already exists (ID: $EXISTING). Deleting old assets and reusing..."
        # Optional: delete old assets here if needed
        RELEASE_ID="$EXISTING"
      else
        RESPONSE=$(curl -s -X POST \
          -H "Authorization: token ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github.v3+json" \
          -d "$(jq -n \
            --arg tag "$TAG" \
            --arg name "$RELEASE_NAME" \
            --arg body "$NOTES" \
            --arg commit "$CI_COMMIT_SHA" \
            '{tag_name: $tag, name: $name, body: $body, target_commitish: $commit, draft: false, prerelease: false}')" \
          "https://api.github.com/repos/${GITHUB_REPO}/releases")

        RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id // empty')

        if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
          echo "Release creation failed. Response:"
          echo "$RESPONSE" | jq .
          exit 1
        fi
      fi

      echo "Release ID: $RELEASE_ID"

      for apk in build/app/outputs/flutter-apk/digital-pet-*.apk; do
        [ -f "$apk" ] || continue
        filename=$(basename "$apk")
        echo "Uploading: $filename"
        curl -s -X POST \
          -H "Authorization: token ${GITHUB_TOKEN}" \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Content-Type: application/vnd.android.package-archive" \
          --data-binary "@$apk" \
          "https://uploads.github.com/repos/${GITHUB_REPO}/releases/${RELEASE_ID}/assets?name=${filename}" | jq -r '.name // .message'
      done

      echo "Done. All APKs uploaded to release $TAG"
