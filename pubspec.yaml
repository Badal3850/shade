name: shade
description: "Your digital shade — a pet that roasts your life using real data."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management / DI
  get_it: ^8.0.3

  # Sensors
  sensors_plus: ^7.0.0
  pedometer: ^4.2.0

  # Local Database
  drift: ^2.28.1
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.0
  path: ^1.9.0

  # Networking
  http: ^1.4.0

  # Persistence
  shared_preferences: ^2.3.0

  # Utilities
  equatable: ^2.0.7
  intl: ^0.20.2
  sqlite3: ^3.3.1
  battery_plus: ^7.0.0
  google_fonts: ^8.1.0
  provider: ^6.1.5+1
  flutter_animate: ^4.5.2
  animations: ^2.2.0
  haptic_feedback: ^0.6.4+3
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  drift_dev: ^2.28.1
  build_runner: ^2.5.1

flutter:
  uses-material-design: true
